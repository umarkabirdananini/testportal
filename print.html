<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selection Slip</title>

  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    #printWrapper {
      max-width: 900px;
      margin: auto;
      background: #fff;
      padding: 20px;
    }

    @media print {
      body {
        background: #fff;
      }

      #printWrapper {
        box-shadow: none;
        margin: 0;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <div id="printWrapper">
    <div id="printArea"></div>
  </div>

  <script>
    // Get stored slip
    const slipHTML = sessionStorage.getItem("SLIP_HTML");
    const slipRef = sessionStorage.getItem("SLIP_REF");
    const slipName = sessionStorage.getItem("SLIP_NAME");

    if (!slipHTML) {
      document.body.innerHTML = "<h3 style='text-align:center;margin-top:50px;'>No slip data found.</h3>";
      throw new Error("No slip data found");
    }

    // Inject slip
    document.getElementById("printArea").innerHTML = slipHTML;

    // 🔥 Set PDF filename (IMPORTANT PART)
    if (slipRef) {
      document.title = slipRef;
      // If you prefer including name:
      // document.title = slipName ? `${slipRef} - ${slipName}` : slipRef;
    }

    // Small delay before printing (important for QR + images to load)
    window.onload = function () {
      setTimeout(() => {
        window.print();
      }, 600);
    };
  </script>

</body>
</html>
